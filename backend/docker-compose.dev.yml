services:
  db:
    image: mysql:8.0
    container_name: lifting_log_db
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 55
      start_period: 5s
    ports:
      - "3306:3306"

  django:
    container_name: lifting_log_django
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"

volumes:
  mysql_data: